<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D8F3DC"/>
      <stop offset="100%" stop-color="#40916C"/>
    </linearGradient>
    <linearGradient id="machine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="300" cy="300" r="250" fill="rgba(255,255,255,0.15)"/>

  <!-- Machine body -->
  <rect x="170" y="140" width="260" height="320" rx="20" fill="url(#machine)" filter="url(#shadow)"/>

  <!-- Top panel / press mechanism -->
  <rect x="180" y="150" width="240" height="60" rx="10" fill="#1B4332"/>
  <rect x="180" y="155" width="240" height="30" rx="10" fill="url(#glow)" opacity="0.3"/>

  <!-- Ice output area -->
  <rect x="195" y="230" width="210" height="140" rx="12" fill="#F0F4F0"/>

  <!-- Clear ice cubes -->
  <rect x="210" y="245" width="40" height="40" rx="6" fill="rgba(255,255,255,0.95)" stroke="#D0E8D0" stroke-width="1"/>
  <rect x="260" y="245" width="40" height="40" rx="6" fill="rgba(255,255,255,0.9)" stroke="#D0E8D0" stroke-width="1"/>
  <rect x="310" y="245" width="40" height="40" rx="6" fill="rgba(255,255,255,0.95)" stroke="#D0E8D0" stroke-width="1"/>
  <rect x="235" y="295" width="40" height="40" rx="6" fill="rgba(255,255,255,0.9)" stroke="#D0E8D0" stroke-width="1"/>
  <rect x="285" y="295" width="40" height="40" rx="6" fill="rgba(255,255,255,0.95)" stroke="#D0E8D0" stroke-width="1"/>
  <rect x="335" y="295" width="40" height="40" rx="6" fill="rgba(255,255,255,0.9)" stroke="#D0E8D0" stroke-width="1"/>

  <!-- Cube sparkles -->
  <circle cx="225" cy="260" r="2.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="320" cy="255" r="2" fill="rgba(255,255,255,0.7)"/>
  <circle cx="275" cy="310" r="2" fill="rgba(255,255,255,0.7)"/>

  <!-- Water level indicator -->
  <rect x="380" y="180" width="8" height="120" rx="4" fill="#1B4332"/>
  <rect x="382" y="240" width="4" height="58" rx="2" fill="#52B788"/>

  <!-- Bottom section / drip tray -->
  <rect x="185" y="390" width="230" height="50" rx="10" fill="#1B4332"/>
  <rect x="185" y="390" width="230" height="15" rx="10" fill="url(#glow)" opacity="0.2"/>

  <!-- Control button -->
  <circle cx="300" cy="415" r="14" fill="#52B788"/>
  <circle cx="300" cy="415" r="10" fill="#40916C"/>
  <path d="M295 415 L305 415 M300 410 L300 420" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Brand label -->
  <rect x="240" y="200" width="120" height="20" rx="10" fill="rgba(255,255,255,0.15)"/>
  <text x="300" y="214" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="2">CHILLCRAFT</text>

  <!-- Decorative snowflakes -->
  <text x="430" y="140" font-size="28" fill="rgba(255,255,255,0.25)" text-anchor="middle">❄</text>
  <text x="170" y="510" font-size="22" fill="rgba(255,255,255,0.2)" text-anchor="middle">❄</text>
  <text x="470" y="490" font-size="18" fill="rgba(255,255,255,0.2)" text-anchor="middle">❄</text>
</svg>
